<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles_dnd.css" />
  <script src="showMonsters.js" defer></script>
  <title>Bestiary D&D 5e</title>
</head>
<body>

  <h1 class="Titleoftheos">Bestiary D&amp;D 5e</h1>
  <p class="undertitle">A compendium of creatures from the open5e API</p>

  <!-- 🔍 Search -->
  <div id="searchbar">
    <label>
      Search:
      <input type="text" id="search" placeholder="e.g. dragon, goblin…" />
    </label>
    <button id="collapse-all-btn" onclick="collapseAll()">Collapse All</button>
    <button id="expand-all-btn"   onclick="expandAll()">Expand All</button>
  </div>

  <!-- ⏳ Loading -->
  <div id="loading-bar" style="display:none;">
    <div class="wrapper">
      <div class="loader-box">
        <div class="loader"></div>
        <div class="loader-text">Loading...</div>
      </div>
      <div class="description-box">Summoning creatures from the depths…</div>
    </div>
  </div>


  <div class="pagination-controls">
    <button onclick="prevPage()">⬅ Previous</button>
    <span id="page-info"></span>
    <button onclick="nextPage()">Next ➡</button>
  </div>

  <div id="error" style="color:red;"></div>

  <div id="parentID"></div>

  
  <div class="pagination-controls">
    <button onclick="prevPage()">⬅ Previous</button>
    <span id="page-info-bottom"></span>
    <button onclick="nextPage()">Next ➡</button>
  </div>

</body>
</html>
